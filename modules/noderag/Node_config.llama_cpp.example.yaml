# Example NodeRAG config using the local llama.cpp integration (DisTraceAI patch).
# Point model_name / embedding_model_name at a local .gguf path OR a HF repo id.
config:
  main_folder: /abs/path/to/your/noderag_index   # must exist; contains input/, cache/, info/
  language: English
  chunk_size: 1048
  embedding_batch_size: 50
  space: l2
  # IMPORTANT: dim MUST match your local embedding model's output dimension
  # (e.g. nomic-embed-text = 768, Qwen3-Embedding-4B = 2560). Default 1536 is OpenAI's.
  dim: 2560

model_config:
  service_provider: llama_cpp
  model_name: unsloth/gemma-4-26B-A4B-it-GGUF   # HF repo id … or a local /path/model.gguf
  gguf_file: "*Q4_K_M*.gguf"                    # filename/glob within the repo (repo mode only)
  n_ctx: 8192
  n_gpu_layers: -1                              # -1 = offload all layers to GPU
  main_gpu: 0
  max_tokens: 4096
  temperature: 0.0
  rate_limit: 1                                 # llama.cpp is serialised; keep low

embedding_config:
  service_provider: llama_cpp_embedding
  embedding_model_name: nomic-ai/nomic-embed-text-v1.5-GGUF
  gguf_file: "*f16*.gguf"
  n_ctx: 8192
  n_gpu_layers: -1
  main_gpu: 0
  rate_limit: 1
